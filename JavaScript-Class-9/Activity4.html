<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 04 — Modo oscuro</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 480px;
            margin: 0 auto;
            padding: 3rem 1rem;
            min-height: 100vh;
            box-sizing: border-box;
            background-color: #ffffff;
            color: #1a1a1a;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Cuando el body tiene la clase "oscuro", se invierten los colores */
        body.oscuro {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }

        button {
            font-size: 1.1rem;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Mi página</h1>
    <p>Probá el botón para cambiar entre modo claro y oscuro.</p>

    <button id="toggle-tema">🌙 Modo oscuro</button>

    <script>
        const boton = document.getElementById('toggle-tema');

        boton.addEventListener("click", (evento) => {
            document.body.classList.toggle('oscuro');

            if (document.body.classList.contains('oscuro')) {
                boton.textContent = "🌙 Modo claro";
            } else {
                boton.textContent = "🌙 Modo oscuro";
            }
        });
    </script>
</body>

</html>
