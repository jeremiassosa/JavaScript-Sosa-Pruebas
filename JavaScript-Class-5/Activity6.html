<body>
    <script>

        function precioEntradas(precioUnitario, cantidad, esSocio) {

            let precio = precioUnitario * cantidad;

            if (cantidad >= 4) {
                precio = precio * 0.9;  //descuento de 10%
            }
            if (esSocio) {
                precio = precio * 0.85; //descuento de 15%
            }
            return precio;
        }
        precioEntradas(`Total final : ${subtotal}`);
    </script>
